dependencies:
  idf: ">=5.5.4"

  common:
    override_path: "../libraries/common"

  cpp_bus_driver:
    override_path: "../libraries/cpp_bus_driver"

  lilygo_device_driver:
    override_path: "../libraries/lilygo_device_driver"

  arduino_cpp_bus_driver:
    override_path: "../libraries/arduino_cpp_bus_driver"

  radiolib_cpp_bus_driver:
    override_path: "../libraries/radiolib_cpp_bus_driver"

  icm20948_we:
    override_path: "../libraries/icm20948_we"

  usp_cpp_bus_driver:
    override_path: "../libraries/usp_cpp_bus_driver"
    matches:
      - if: "$CONFIG{LILYGO_DEVICE_DRIVER_T_GLASSES_P4} == True"
      - if: "$CONFIG{LILYGO_DEVICE_DRIVER_T_DISPLAY_P4} == True"

  stsw-st25rfal002_cpp_bus_driver:
    override_path: "../libraries/stsw-st25rfal002_cpp_bus_driver"
    matches:
      - if: "$CONFIG{EXAMPLE_BUILD_ST25R3916} == True"
      - if: "$CONFIG{LILYGO_DEVICE_DRIVER_T_DISPLAY_P4_AIR} == True"

  lvgl/lvgl:
    version: "9.5.0"
    matches:
      - if: "$CONFIG{EXAMPLE_BUILD_SCREEN_LVGL} == True"
      - if: "$CONFIG{EXAMPLE_BUILD_SCREEN_LVGL_TOUCH_DRAW} == True"

  espressif/esp_video:
    override_path: "../libraries/esp-video-components/esp_video"
    matches:
      - if: "$CONFIG{EXAMPLE_BUILD_SCREEN_CAMERA} == True"

  espressif/esp_hosted:
    version: "2.12.3"
    matches:
      - if: "$CONFIG{EXAMPLE_BUILD_WIFI_SCAN_CONNECT_TIME} == True"
      - if: "$CONFIG{EXAMPLE_BUILD_NETWORK_ADAPTER_UPDATE} == True"
      - if: "$CONFIG{EXAMPLE_BUILD_OTA_UPDATE} == True"

  espressif/esp_wifi_remote:
    version: ">=1.6.1,<2.0"
    matches:
      - if: "$CONFIG{EXAMPLE_BUILD_WIFI_SCAN_CONNECT_TIME} == True"
      - if: "$CONFIG{EXAMPLE_BUILD_NETWORK_ADAPTER_UPDATE} == True"
      - if: "$CONFIG{EXAMPLE_BUILD_OTA_UPDATE} == True"

  joltwallet/littlefs:
    version: ">=1.21.0,<2.0.0"
    matches:
      - if: "$CONFIG{EXAMPLE_BUILD_NETWORK_ADAPTER_UPDATE} == True"
      - if: "$CONFIG{EXAMPLE_BUILD_OTA_UPDATE} == True"
